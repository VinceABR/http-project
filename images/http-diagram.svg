<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
<title id="title">HTTP request and response diagram</title>
<desc id="desc">A client browser sends an HTTP request to a web server and receives an HTTP response.</desc>
<rect width="900" height="420" fill="#f7fafc"/>
<rect x="60" y="120" width="230" height="150" rx="18" fill="#ffffff" stroke="#1f4e79" stroke-width="4"/>
<text x="175" y="180" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700" fill="#1f2937">Client</text>
<text x="175" y="220" text-anchor="middle" font-family="Arial" font-size="20" fill="#374151">Web Browser</text>
<rect x="610" y="120" width="230" height="150" rx="18" fill="#ffffff" stroke="#2f855a" stroke-width="4"/>
<text x="725" y="180" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700" fill="#1f2937">Server</text>
<text x="725" y="220" text-anchor="middle" font-family="Arial" font-size="20" fill="#374151">Website / API</text>
<path d="M310 155 C400 95 500 95 590 155" fill="none" stroke="#d97706" stroke-width="7" marker-end="url(#arrow)"/>
<text x="450" y="90" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#92400e">HTTP Request</text>
<text x="450" y="118" text-anchor="middle" font-family="Arial" font-size="18" fill="#92400e">GET, POST, headers, body</text>
<path d="M590 235 C500 315 400 315 310 235" fill="none" stroke="#2563eb" stroke-width="7" marker-end="url(#arrow2)"/>
<text x="450" y="350" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#1d4ed8">HTTP Response</text>
<text x="450" y="378" text-anchor="middle" font-family="Arial" font-size="18" fill="#1d4ed8">status code, headers, HTML, JSON, images</text>
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#d97706"/></marker>
<marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker>
</defs>
</svg>
